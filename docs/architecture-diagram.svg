    <rect x="316" y="214" width="148" height="26" rx="5" fill="#ffffff" stroke="#aac7e8"/>
    <text x="390" y="231" text-anchor="middle">Copy Activity x3</text>

    <rect x="316" y="246" width="148" height="26" rx="5" fill="#ffffff" stroke="#aac7e8"/>
