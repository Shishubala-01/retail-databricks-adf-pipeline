  <text x="895" y="170" font-size="13" font-weight="600" fill="#1f2733" text-anchor="middle">Bronze</text>
  <text x="895" y="188" font-size="10.5" fill="#6b7280" text-anchor="middle">schema-enforced raw ingest, append-only</text>
