  </defs>

  <rect width="1480" height="760" fill="#fbfaf8"/>

  <text x="40" y="42" font-size="24" font-weight="700" fill="#1f2733">Retail Sales &amp; Customer Insight Pipeline</text>
  <text x="40" y="66" font-size="14" fill="#6b7280">Azure Data Factory + Azure Databricks &#8226; medallion architecture (Bronze / Silver / Gold)</text>

