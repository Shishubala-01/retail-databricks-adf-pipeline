  <text x="895" y="372" font-size="10.5" fill="#6b7280" text-anchor="middle">daily_sales_summary &#8226; top_products</text>
  <text x="895" y="387" font-size="10.5" fill="#6b7280" text-anchor="middle">customer_value</text>

  <line x1="1060" y1="200" x2="1120" y2="200" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>

