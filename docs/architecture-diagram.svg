  <text x="1320" y="116" font-size="13" font-weight="700" fill="#6b7280" letter-spacing="1">CONSUMERS</text>
  <rect x="1320" y="130" width="120" height="56" rx="8" fill="#ffffff" stroke="#c9cdd3"/>
  <text x="1380" y="153" font-size="12" font-weight="600" fill="#1f2733" text-anchor="middle">Power BI</text>
  <text x="1380" y="171" font-size="10.5" fill="#6b7280" text-anchor="middle">ops dashboard</text>

  <rect x="1320" y="200" width="120" height="56" rx="8" fill="#ffffff" stroke="#c9cdd3"/>
  <text x="1380" y="223" font-size="12" font-weight="600" fill="#1f2733" text-anchor="middle">Marketing/CRM</text>
  <text x="1380" y="241" font-size="10.5" fill="#6b7280" text-anchor="middle">segmentation feed</text>

  <!-- Rejected path: routed left of the Gold box so it doesn't cross any text -->
  <line x1="752" y1="272" x2="700" y2="272" stroke="#b8401c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="700" y1="272" x2="700" y2="460" stroke="#b8401c" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <rect x="585" y="468" width="230" height="50" rx="8" fill="#ffffff" stroke="#d65a31" stroke-dasharray="3,2"/>
  <text x="700" y="488" font-size="11.5" font-weight="600" fill="#b8401c" text-anchor="middle">rejected zone</text>
  <text x="700" y="504" font-size="10" fill="#8a5a05" text-anchor="middle">quarantined rows + reason code</text>

  <!-- Key Vault note -->
  <rect x="300" y="350" width="180" height="44" rx="8" fill="#f1eefb" stroke="#7a5fc0" stroke-dasharray="3,2"/>
  <text x="390" y="368" font-size="11" font-weight="600" fill="#5a3fae" text-anchor="middle">Azure Key Vault</text>
  <text x="390" y="383" font-size="10" fill="#5a3fae" text-anchor="middle">secrets for every linked service</text>
  <line x1="390" y1="350" x2="390" y2="320" stroke="#7a5fc0" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Legend -->
  <g font-size="11" fill="#6b7280">
    <text x="40" y="700">Solid arrows: data flow &#160;&#160;&#8226;&#160;&#160; Dashed: quarantine / security dependency</text>
