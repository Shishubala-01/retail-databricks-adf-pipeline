  <text x="895" y="256" font-size="13" font-weight="600" fill="#1f2733" text-anchor="middle">Silver</text>
  <text x="895" y="274" font-size="10.5" fill="#6b7280" text-anchor="middle">null / duplicate / range / referential-integrity</text>
  <text x="895" y="289" font-size="10.5" fill="#6b7280" text-anchor="middle">checks &#8594; quarantine bad rows + dq_log</text>
  <text x="895" y="304" font-size="10.5" fill="#6b7280" text-anchor="middle">clean, conformed Delta tables</text>

