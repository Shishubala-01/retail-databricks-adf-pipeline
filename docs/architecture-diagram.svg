    <text x="60" y="223" fill="#1f2733" font-weight="600">CRM / catalog DB</text>
    <text x="60" y="241" fill="#6b7280" font-size="11">Azure SQL Database</text>

    <rect x="40" y="270" width="190" height="56" rx="8" fill="#ffffff" stroke="#c9cdd3"/>
    <text x="60" y="293" fill="#1f2733" font-weight="600">Web/app clickstream</text>
    <text x="60" y="311" fill="#6b7280" font-size="11">REST API (paginated)</text>
  </g>

  <line x1="230" y1="158" x2="300" y2="158" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="230" y1="228" x2="300" y2="200" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="230" y1="298" x2="300" y2="245" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>

