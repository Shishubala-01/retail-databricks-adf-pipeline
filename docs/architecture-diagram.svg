  <rect x="1120" y="140" width="140" height="120" rx="10" fill="#fff7e6" stroke="#c98a1b" stroke-width="1.5"/>
  <text x="1190" y="166" font-size="13" font-weight="700" fill="#8a5a05" text-anchor="middle">ADLS Gen2</text>
  <text x="1190" y="184" font-size="12" fill="#8a5a05" text-anchor="middle">curated zone</text>
  <text x="1190" y="208" font-size="10.5" fill="#9a7a3a" text-anchor="middle">business-ready</text>
  <text x="1190" y="224" font-size="10.5" fill="#9a7a3a" text-anchor="middle">Delta tables</text>

  <line x1="1260" y1="200" x2="1320" y2="200" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>

