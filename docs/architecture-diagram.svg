  <text x="605" y="208" font-size="10.5" fill="#9a7a3a" text-anchor="middle">landing, as-received</text>
  <text x="605" y="224" font-size="10.5" fill="#9a7a3a" text-anchor="middle">CSV / JSON</text>

  <line x1="670" y1="200" x2="730" y2="200" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>

